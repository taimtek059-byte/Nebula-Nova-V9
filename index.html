<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebula Nova OS V9</title>
    <style>
        :root {
            --glass-bg: rgba(20, 20, 30, 0.45);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-highlight: inset 0 1px 1px rgba(255, 255, 255, 0.4);
            --blur: blur(35px);
            --font-family: -apple-system, sans-serif;
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: var(--font-family); background: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=2000') center/cover; user-select: none; -webkit-user-select: none; transition: background 0.5s; }

        /* Menu & Desktop */
        #menu-bar { position: fixed; top: 0; width: 100%; height: 32px; background: rgba(0,0,0,0.3); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); color: white; display: flex; align-items: center; padding: 0 20px; font-size: 13px; z-index: 10000; box-shadow: 0 1px 0 rgba(255,255,255,0.1); }
        #desktop { position: absolute; top: 32px; bottom: 80px; left: 0; right: 0; }
        .desktop-icon { position: absolute; width: 75px; text-align: center; color: white; text-shadow: 0 2px 5px rgba(0,0,0,0.8); cursor: pointer; border-radius: 12px; padding: 10px 5px; transition: background 0.2s; }
        .desktop-icon:active { background: rgba(255,255,255,0.15); }
        .desktop-icon span { font-size: 42px; display: block; margin-bottom: 5px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4)); }
        .icon-name { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}

        /* Windows */
        .window { position: absolute; background: var(--glass-bg); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border-radius: 16px; border: 1px solid var(--glass-border); box-shadow: 0 30px 60px rgba(0,0,0,0.6), var(--glass-highlight); display: flex; flex-direction: column; overflow: hidden; will-change: transform; animation: popIn 0.2s ease-out; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .title-bar { height: 40px; background: rgba(255,255,255,0.03); display: flex; align-items: center; padding: 0 15px; cursor: grab; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .dots { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; box-shadow: inset 0 1px 2px rgba(0,0,0,0.5); }
        .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }
        .window-title { color: white; font-size: 13px; font-weight: 600; flex-grow: 1; text-align: center; margin-right: 45px; }
        .content { flex-grow: 1; color: white; overflow-y: auto; display: flex; flex-direction: column; position: relative;}
        
        /* UI Elements */
        .luxury-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 20px; color: white; padding: 8px 18px; font-weight: 600; backdrop-filter: blur(10px); cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.2), inset 0 1px 1px rgba(255,255,255,0.2); }
        .luxury-btn:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-1px); }
        .luxury-btn:active { transform: scale(0.95); }
        .luxury-btn.primary { background: rgba(0, 122, 255, 0.5); border-color: rgba(0, 122, 255, 0.8); }

        /* YouTube Grid */
        .yt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; padding: 20px; background: #0f0f0f; }
        .yt-card { cursor: pointer; transition: transform 0.2s; }
        .yt-card:hover { transform: scale(1.05); }
        .yt-thumb { width: 100%; border-radius: 12px; aspect-ratio: 16/9; object-fit: cover; }
        .yt-title { font-size: 13px; font-weight: bold; margin-top: 8px; color: white; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Dock */
        #dock-container { position: fixed; bottom: 15px; width: 100%; display: flex; justify-content: center; z-index: 10000; }
        #dock { background: rgba(0,0,0,0.3); backdrop-filter: var(--blur); padding: 12px; border-radius: 28px; display: flex; gap: 15px; border: 1px solid var(--glass-border); box-shadow: var(--glass-highlight), 0 10px 30px rgba(0,0,0,0.5); }
        .dock-icon { width: 50px; height: 50px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 30px; background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(200,200,200,0.8)); transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .dock-icon:hover { transform: scale(1.3) translateY(-12px); z-index: 10; }
    </style>
</head>
<body>

<div id="menu-bar">
    <span style="font-weight: bold; margin-right: 20px; font-size: 16px;"> Nebula Nova</span>
    <span id="active-app" style="opacity: 0.8;">Desktop</span>
    <div style="margin-left: auto; display: flex; gap: 15px;"><span>🔋 100%</span><span id="clock">00:00</span></div>
</div>

<div id="desktop"></div>

<div id="dock-container">
    <div id="dock">
        <div class="dock-icon" onclick="launch('installer')" title="App Installer">➕</div>
        <div class="dock-icon" onclick="launch('web')" title="Google">🌐</div>
        <div class="dock-icon" onclick="launch('youtube')" title="YouTube">📺</div>
        <div class="dock-icon" onclick="launch('settings')" title="Settings">⚙️</div>
    </div>
</div>

<script>
    let zIdx = 100;

    // --- Data Storage ---
    let systemPrefs = JSON.parse(localStorage.getItem('novaPrefs9')) || { wallpaper: "https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=2000" };
    let desktopApps = JSON.parse(localStorage.getItem('novaDesktop9')) || [
        { id: 'photos', name: 'Photos', icon: '🖼️', x: 20, y: 20 },
        { id: 'installer', name: 'Installer', icon: '➕', x: 20, y: 120 }
    ];

    document.body.style.backgroundImage = `url('${systemPrefs.wallpaper}')`;

    function saveData() {
        localStorage.setItem('novaPrefs9', JSON.stringify(systemPrefs));
        localStorage.setItem('novaDesktop9', JSON.stringify(desktopApps));
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); }, 1000);

    // --- Desktop Rendering ---
    function renderDesktop() {
        const desk = document.getElementById('desktop');
        desk.innerHTML = '';
        desktopApps.forEach((app, index) => {
            const icon = document.createElement('div');
            icon.className = 'desktop-icon';
            icon.style.left = app.x + 'px'; icon.style.top = app.y + 'px';
            icon.innerHTML = `<span>${app.icon}</span><div class="icon-name">${app.name}</div>`;
            
            let isDragging = false; let startX, startY;
            icon.onpointerdown = (e) => { isDragging = false; startX = e.clientX; startY = e.clientY; icon.setPointerCapture(e.pointerId); };
            icon.onpointermove = (e) => {
                if (Math.abs(e.clientX - startX) > 5 || Math.abs(e.clientY - startY) > 5) isDragging = true;
                if (isDragging) { icon.style.left = (e.clientX - 35) + 'px'; icon.style.top = (e.clientY - 45) + 'px'; }
            };
            icon.onpointerup = (e) => {
                icon.releasePointerCapture(e.pointerId);
                if (isDragging) { desktopApps[index].x = parseInt(icon.style.left); desktopApps[index].y = parseInt(icon.style.top); saveData(); } 
                else { 
                    if(app.url) { launchSecureApp(app.name, app.url); } else { launch(app.id); }
                }
            };
            desk.appendChild(icon);
        });
    }
    renderDesktop();

    // The Universal App Installer
    window.createCustomApp = function() {
        const name = document.getElementById('new-app-name').value;
        const emoji = document.getElementById('new-app-emoji').value;
        const url = document.getElementById('new-app-url').value;
        
        if(name && emoji && url) {
            desktopApps.push({ id: 'custom', name: name, icon: emoji, x: 100, y: 100, url: url });
            saveData(); renderDesktop();
            document.getElementById('win-installer').remove();
            alert(name + " added to your Desktop!");
        } else {
            alert("Please fill in all fields!");
        }
    };

    // --- Secure App Launcher (For sites that block iframes) ---
    function launchSecureApp(name, url) {
        const winId = 'win-secure-' + name.replace(/\s/g, '');
        if (document.getElementById(winId)) { focusWin(document.getElementById(winId)); return; }
        
        const win = document.createElement('div');
        win.id = winId; win.className = 'window';
        win.style.width = '450px'; win.style.height = '300px';
        win.style.left = '150px'; win.style.top = '150px';
        
        win.innerHTML = `
            <div class="title-bar" onpointerdown="startDrag(event, '${win.id}')">
                <div class="dots"><div class="dot red" onclick="document.getElementById('${win.id}').remove()"></div><div class="dot yellow"></div><div class="dot green"></div></div>
                <div class="window-title">${name}</div>
            </div>
            <div class="content" style="padding:30px; text-align:center; background:#1e1e1e; display:flex; flex-direction:column; justify-content:center; align-items:center;">
                <h2 style="margin-bottom: 10px;">${name} Guard</h2>
                <p style="font-size: 13px; color: #aaa; margin-bottom: 20px;">Sites like ${name} block inside-window viewing for your security. Click below to launch it safely.</p>
                <button class="luxury-btn primary" onclick="window.open('${url}', '_blank')">Launch ${name} Securely</button>
            </div>
        `;
        document.body.appendChild(win); focusWin(win);
    }

    // YouTube Video Player Function
    window.playYT = function(id) {
        const contentDiv = document.getElementById('yt-content-area');
        contentDiv.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" style="width:100%; height:100%; border:none;" allow="autoplay; fullscreen"></iframe>`;
    }

    // --- Window Manager ---
    function launch(type) {
        if (document.getElementById('win-' + type)) { focusWin(document.getElementById('win-' + type)); return; }

        const win = document.createElement('div');
        win.id = 'win-' + type; win.className = 'window';
        win.style.width = '800px'; win.style.height = '550px';
        win.style.left = (Math.random() * 50 + 50) + 'px'; win.style.top = (Math.random() * 50 + 50) + 'px';
        
        let title = ''; let html = '';

        if (type === 'installer') {
            title = 'Universal App Installer';
            win.style.width = '400px'; win.style.height = '400px';
            html = `
                <div style="padding: 30px; text-align:center;">
                    <h2>Install Web App</h2>
                    <p style="font-size:12px; opacity:0.7;">Found an app on Google? Paste the link here to add it to your Desktop.</p>
                    <input type="text" id="new-app-name" placeholder="App Name (e.g. Steam)" style="width:100%; padding:10px; margin-top:10px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.2); color:white; border-radius:8px; outline:none;">
                    <input type="text" id="new-app-emoji" placeholder="Emoji Icon (e.g. 🎮)" style="width:100%; padding:10px; margin-top:10px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.2); color:white; border-radius:8px; outline:none;">
                    <input type="text" id="new-app-url" placeholder="Website URL (https://...)" style="width:100%; padding:10px; margin-top:10px; margin-bottom: 20px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.2); color:white; border-radius:8px; outline:none;">
                    <button class="luxury-btn primary" onclick="window.createCustomApp()" style="width:100%;">Add to Desktop</button>
                </div>`;
        } else if (type === 'web') {
            title = 'Google Browser';
            // Using the /search?igu=1 trick to allow Google inside an iframe
            html = `<iframe src="https://www.google.com/search?igu=1" style="width:100%; height:100%; border:none; background:white;"></iframe>`;
        } else if (type === 'youtube') {
            title = 'YouTube';
            const videos = [
                {id: 'jfKfPfyJRdk', title: 'Lofi Hip Hop Radio - Beats to Relax/Study to'},
                {id: 'LXb3EKWsInQ', title: 'Costa Rica 4K - Scenic Relaxation'},
                {id: 'dQw4w9WgXcQ', title: 'Never Gonna Give You Up (Remastered)'},
                {id: '2g811Eo7K8U', title: 'Space Engine - Universe Explorer'},
                {id: 'EngW7tLk6R8', title: 'Funny Cats Compilation 2024'},
                {id: '09R8_2nJtjg', title: 'Marques Brownlee - iPhone Review'}
            ];
            
            let gridHtml = videos.map(v => `
                <div class="yt-card" onclick="window.playYT('${v.id}')">
                    <img class="yt-thumb" src="https://img.youtube.com/vi/${v.id}/maxresdefault.jpg" onerror="this.src='https://img.youtube.com/vi/${v.id}/hqdefault.jpg'">
                    <div class="yt-title">${v.title}</div>
                </div>
            `).join('');

            html = `
                <div style="display:flex; gap:10px; padding:12px; background:#202020; border-bottom:1px solid #333;">
                    <button class="luxury-btn" onclick="document.getElementById('win-youtube').remove(); launch('youtube');">🏠 Home</button>
                    <input type="text" id="yt-search" placeholder="Search or paste Video ID..." style="flex-grow:1; background:#121212; border:1px solid #303030; color:white; padding:8px 15px; border-radius:20px; outline:none;">
                    <button class="luxury-btn primary" onclick="window.playYT(document.getElementById('yt-search').value)">Search</button>
                </div>
                <div id="yt-content-area" style="flex-grow:1; background:#0f0f0f; overflow-y:auto;">
                    <div class="yt-grid">${gridHtml}</div>
                </div>`;
        } else if (type === 'settings') {
            title = 'Settings';
            html = `<div style="padding: 30px; text-align:center;"><h2>Settings</h2><button class="luxury-btn primary" onclick="localStorage.clear(); location.reload();">Reset OS Data</button></div>`;
        }

        win.innerHTML = `<div class="title-bar" onpointerdown="startDrag(event, '${win.id}')"><div class="dots"><div class="dot red" onclick="document.getElementById('${win.id}').remove()"></div><div class="dot yellow"></div><div class="dot green"></div></div><div class="window-title">${title}</div></div><div class="content">${html}</div>`;
        document.body.appendChild(win); focusWin(win);
    }

    function focusWin(win) { zIdx++; win.style.zIndex = zIdx; document.getElementById('active-app').innerText = win.querySelector('.window-title').innerText; }
    function startDrag(e, id) { const win = document.getElementById(id); focusWin(win); let startX = e.clientX - win.offsetLeft; let startY = e.clientY - win.offsetTop; function move(ev) { win.style.left = (ev.clientX - startX) + 'px'; win.style.top = (ev.clientY - startY) + 'px'; } document.addEventListener('pointermove', move); document.onpointerup = () => document.removeEventListener('pointermove', move); }
    document.oncontextmenu = (e) => e.preventDefault();
</script>
</body>
</html>
